- name : installation package
  hosts : all
  become : true
  tasks :
    - name : install httpd
      package :
        name: httpd
        state: present
      when : ansible_os_family == "RedHat"
 
    - name : install apache2
      package :
        name: apache2
        state: present
      when : ansible_os_family == "Debian"

    - name : start httpd service 
      service :
        name: httpd
        state: started
      when : ansible_os_family == "RedHat"

    - name : start apache2 service
      service :
        name: apache2
        state: started
      when : ansible_os_family == "Debian"