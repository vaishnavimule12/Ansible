- name : "Variables Learning"
  hosts : all
  #vars : 
   # animal : "lion"
  #vars_files:
   # - ./vars.txt
  vars_prompt:
    - name : animal
      prompt : "Please enter the animal name"
  tasks :
    - name: "Print the animal 1"
      debug:
        msg: "the animal is {{animal}}"
    - name: "Print the animal 2"
      debug:
        msg: "the animal is {{animal}}"   
    - name: "print animal with using local"
      debug:
        msg: "the animal is {{animal}}"
      vars:
        animal: "tiger"

    - name : get hostname 
      shell : hostname
      register: hostname
    - name : print hostname
      debug:
        msg: "the hostname is {{hostname}}"